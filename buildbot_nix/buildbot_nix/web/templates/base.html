<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
          content="buildbot-nix: continuous integration for Nix projects">
    <meta name="keywords" content="nix, ci, builds, buildbot-nix">
    <title>
      {% block title %}
        buildbot-nix
      {% endblock title %}
    </title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body {% block bodyattrs %}{% endblock bodyattrs %}>
    <a class="skip-link" href="#main">skip to content</a>
    <header>
      <h1>
        <a href="/">buildbot-nix</a>
      </h1>
      <a href="/builds">builds</a>
      <span class="header-spacer"></span>
      {% if user %}
        <span class="muted">{{ user.qualified }}</span>
        <a href="/tokens">tokens</a>
        <form action="/logout" method="post">
          <button>logout</button>
        </form>
      {% else %}
        {% for provider in login_providers %}
          <a href="/login/{{ provider }}">login with {{ provider }}</a>
        {% endfor %}
      {% endif %}
    </header>
    {% block body %}
    {% endblock body %}
    <script>
      /* Live updates: the server pushes status changes over SSE
         (Postgres NOTIFY behind /events). Elements with
         data-poll-url refetch their fragment; tables with
         data-row-url patch or prepend single rows. */
      const eventsUrl = document.body.dataset.events;
      if (eventsUrl) {
        const refreshFragments = () => {
          for (const el of document.querySelectorAll("[data-poll-url]")) {
            // Swapping would steal keyboard focus and collapse any
            // expanded error; skip until the next event.
            if (el.contains(document.activeElement)) continue;
            if (el.querySelector("details[open]")) continue;
            fetch(el.dataset.pollUrl)
              .then((res) => (res.ok ? res.text() : null))
              .then((html) => {
                if (html === null) return;
                el.innerHTML = html;
                document.dispatchEvent(new Event("fragmentswap"));
              })
              .catch(() => { /* transient */ });
          }
        };
        const patchRow = async (table, e) => {
          const url = new URL(table.dataset.rowUrl, location.origin);
          url.searchParams.set("id", e.build_id);
          const res = await fetch(url);
          if (!res.ok) return;
          const html = (await res.text()).trim();
          const row = table.querySelector(`tr[data-id="${e.build_id}"]`);
          if (!html) {
            // The build no longer matches the table's filters.
            if (row) row.remove();
          } else if (row) {
            row.outerHTML = html;
          } else {
            const top = table.querySelector("tr[data-id]");
            // Only prepend new builds; an absent older build lives
            // on a page not yet scrolled to.
            if (!top || e.build_id > Number(top.dataset.id)) {
              const header = table.querySelector("tr:not([data-id])");
              header.insertAdjacentHTML("afterend", html);
            }
          }
        };
        /* Coalesce bursts (an eval inserts many attributes at once):
           one refetch per fragment and per dirty build id. */
        const dirty = new Set();
        let debounce = null;
        const flush = () => {
          for (const table of document.querySelectorAll("table[data-row-url]")) {
            for (const id of dirty) patchRow(table, { build_id: id });
          }
          dirty.clear();
          refreshFragments();
        };
        let connected = false;
        const source = new EventSource(eventsUrl);
        source.onopen = () => {
          // Catch up after a reconnect; the first open needs nothing.
          if (connected) refreshFragments();
          connected = true;
        };
        source.onmessage = (ev) => {
          let e;
          try { e = JSON.parse(ev.data); } catch { return; }
          document.dispatchEvent(new CustomEvent("buildevent", { detail: e }));
          dirty.add(e.build_id);
          clearTimeout(debounce);
          debounce = setTimeout(flush, 300);
        };
      }
      /* Infinite scroll: append row fragments when the sentinel under
         a table.builds becomes visible. Cursor is the last row id. */
      const sentinel = document.querySelector("[data-more-url]");
      if (sentinel) {
        const body = sentinel.previousElementSibling.tBodies[0];
        let busy = false;
        const io = new IntersectionObserver(async (entries) => {
          if (!entries[0].isIntersecting || busy) return;
          busy = true;
          const url = new URL(sentinel.dataset.moreUrl, location.origin);
          const rows = body.querySelectorAll("tr[data-id]");
          if (rows.length) url.searchParams.set("before", rows[rows.length - 1].dataset.id);
          try {
            const res = await fetch(url);
            const html = (await res.text()).trim();
            if (!res.ok || !html) { io.disconnect(); sentinel.remove(); return; }
            body.insertAdjacentHTML("beforeend", html);
          } catch (e) { /* transient; retried on next intersection */ }
          busy = false;
        });
        io.observe(sentinel);
      }
      /* Project filter: server-side, so it works regardless of what
         is loaded. The filtered URL is stored in data-poll-url so SSE
         refreshes keep the filter. */
      const pfilter = document.querySelector("#pipeline-filter");
      if (pfilter) {
        const wrap = document.querySelector("#pipelines");
        let timer = null;
        pfilter.addEventListener("input", () => {
          clearTimeout(timer);
          timer = setTimeout(() => {
            const url = new URL("/fragments/pipelines", location.origin);
            if (pfilter.value) url.searchParams.set("q", pfilter.value);
            wrap.dataset.pollUrl = url.pathname + url.search;
            fetch(url)
              .then((res) => (res.ok ? res.text() : null))
              .then((html) => { if (html !== null) wrap.innerHTML = html; })
              .catch(() => { /* transient */ });
          }, 200);
        });
      }
      /* Attribute filter: client-side, the build page renders all
         attributes. */
      const afilter = document.querySelector("#attr-filter");
      if (afilter) {
        const apply = () => {
          const q = afilter.value.toLowerCase();
          for (const row of document.querySelectorAll("[data-attr]")) {
            row.style.display = row.dataset.attr.includes(q) ? "" : "none";
          }
        };
        afilter.addEventListener("input", apply);
        // Fragment swaps replace the filtered rows; re-apply.
        document.addEventListener("fragmentswap", apply);
      }
    </script>
  </body>
</html>
