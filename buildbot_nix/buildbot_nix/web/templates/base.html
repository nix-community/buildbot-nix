<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
          content="buildbot-nix: continuous integration for Nix projects">
    <meta name="keywords" content="nix, ci, builds, buildbot-nix">
    <title>
      {% block title %}
        buildbot-nix
      {% endblock title %}
    </title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body {% block bodyattrs %}{% endblock bodyattrs %}>
    <a class="skip-link" href="#main">skip to content</a>
    <header>
      <h1>
        <a href="/">buildbot-nix</a>
      </h1>
      <a href="/builds">builds</a>
      <span class="header-spacer"></span>
      {% if user %}
        <span class="muted">{{ user.qualified }}</span>
        <a href="/tokens">tokens</a>
        <form action="/logout" method="post">
          <button>logout</button>
        </form>
      {% else %}
        {% for provider in login_providers %}
          <a href="/login/{{ provider }}">login with {{ provider }}</a>
        {% endfor %}
      {% endif %}
    </header>
    {% block body %}
    {% endblock body %}
    <script src="/static/vendor/htmx.min.js"></script>
    <script src="/static/vendor/sse.min.js"></script>
    <script src="/static/vendor/idiomorph-ext.min.js"></script>
    <script>
      /* Attribute filter: client-side, the build page renders all
         attributes. Re-applied after htmx swaps in fresh rows. */
      const afilter = document.querySelector("#attr-filter");
      if (afilter) {
        const apply = () => {
          const q = afilter.value.toLowerCase();
          for (const row of document.querySelectorAll("[data-attr]")) {
            row.style.display = row.dataset.attr.includes(q) ? "" : "none";
          }
        };
        afilter.addEventListener("input", apply);
        document.body.addEventListener("htmx:afterSwap", apply);
      }
    </script>
  </body>
</html>
