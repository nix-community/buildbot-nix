<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
          content="buildbot-nix: continuous integration for Nix projects">
    <meta name="keywords" content="nix, ci, builds, buildbot-nix">
    <title>
      {% block title %}
        buildbot-nix
      {% endblock title %}
    </title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <a class="skip-link" href="#main">skip to content</a>
    <header>
      <h1>
        <a href="/">buildbot-nix</a>
      </h1>
      <a href="/builds">builds</a>
      <span class="header-spacer"></span>
      {% if user %}
        <span class="muted">{{ user.qualified }}</span>
        <a href="/tokens">tokens</a>
        <form action="/logout" method="post">
          <button>logout</button>
        </form>
      {% else %}
        {% for provider in login_providers %}
          <a href="/login/{{ provider }}">login with {{ provider }}</a>
        {% endfor %}
      {% endif %}
    </header>
    {% block body %}
    {% endblock body %}
    <script>
      /* Live updates: elements with data-poll-url refresh while builds run. */
      for (const el of document.querySelectorAll("[data-poll-url]")) {
        const tick = async () => {
          // Swapping would steal keyboard focus and collapse any
          // expanded error; wait for the next tick instead.
          if (el.contains(document.activeElement)) return;
          if (el.querySelector("details[open]")) return;
          try {
            const res = await fetch(el.dataset.pollUrl);
            if (res.ok) el.innerHTML = await res.text();
          } catch (e) { /* transient */ }
        };
        setInterval(tick, 5000);
      }
      /* Infinite scroll: append row fragments when the sentinel under
         a table.builds becomes visible. Cursor is the last row id. */
      const sentinel = document.querySelector("[data-more-url]");
      if (sentinel) {
        const body = sentinel.previousElementSibling.tBodies[0];
        let busy = false;
        const io = new IntersectionObserver(async (entries) => {
          if (!entries[0].isIntersecting || busy) return;
          busy = true;
          const url = new URL(sentinel.dataset.moreUrl, location.origin);
          const rows = body.querySelectorAll("tr[data-id]");
          if (rows.length) url.searchParams.set("before", rows[rows.length - 1].dataset.id);
          try {
            const res = await fetch(url);
            const html = (await res.text()).trim();
            if (!res.ok || !html) { io.disconnect(); sentinel.remove(); return; }
            body.insertAdjacentHTML("beforeend", html);
          } catch (e) { /* transient; retried on next intersection */ }
          busy = false;
        });
        io.observe(sentinel);
      }
      /* Landing page: filter pipeline rows as you type; submitting
         the form searches attributes server-side. */
      const pfilter = document.querySelector("#pipeline-filter");
      if (pfilter) {
        pfilter.addEventListener("input", () => {
          const q = pfilter.value.toLowerCase();
          for (const row of document.querySelectorAll("[data-pipeline]")) {
            row.style.display = row.dataset.pipeline.includes(q) ? "" : "none";
          }
        });
      }
      /* Client-side attribute filter. */
      const filter = document.querySelector("#attr-filter");
      if (filter) {
        filter.addEventListener("input", () => {
          const q = filter.value.toLowerCase();
          for (const row of document.querySelectorAll("[data-attr]")) {
            row.style.display = row.dataset.attr.includes(q) ? "" : "none";
          }
        });
      }
    </script>
  </body>
</html>
