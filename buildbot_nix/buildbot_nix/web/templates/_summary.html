<div class="summary-strip">
  <span class="summary-item">
    <span class="dot building" aria-hidden="true"></span>
    {{ (counts.building | default(0) ) + (counts.evaluating | default(0)) }} running
  </span>
  <span class="summary-item">
    <span class="dot pending" aria-hidden="true"></span>
    {{ counts.pending | default(0) }} queued
  </span>
  <span class="summary-item muted">{{ project_count }} projects</span>
</div>
